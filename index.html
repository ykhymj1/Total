<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#070e1c"/>
<title>내 자산관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#070e1c;font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
button{touch-action:manipulation;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
input{-webkit-appearance:none;appearance:none;font-size:16px!important;font-family:'Noto Sans KR',sans-serif;}
input:focus{outline:none;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}

/* ── 화면 레이어 ── */
#loginScreen,#lockScreen,#homeScreen,#appLayer{position:fixed;inset:0;max-width:480px;margin:0 auto;}

/* ══════════════════════════════
   ★ 새로 추가: Firebase 로그인 화면
══════════════════════════════ */
#loginScreen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#060d1a 0%,#070e1c 100%);
  padding:32px 24px;z-index:200;overflow-y:auto;
}
#loginScreen.show{display:flex;}
.login-input{
  width:100%;padding:16px 18px;
  background:#0e1c2e;border:1.5px solid #1e3250;
  border-radius:14px;color:#f0f4f8;
  font-size:16px!important;outline:none;
  box-sizing:border-box;transition:border-color .2s;
  font-family:'Noto Sans KR',sans-serif;
}
.login-input:focus{border-color:#4a8fff;}
.login-btn-primary{
  width:100%;padding:16px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  border:none;border-radius:14px;color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  transition:opacity .15s;
}
.login-btn-primary:active{opacity:.85;}
.login-btn-primary:disabled{background:#1a2a44;color:#7090b8;cursor:not-allowed;}
.login-btn-secondary{
  width:100%;padding:14px;
  background:transparent;border:1.5px solid #1e3250;
  border-radius:14px;color:#7090b8;
  font-size:14px;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  transition:border-color .2s;
}
.login-btn-secondary:active{border-color:#4a8fff;color:#4a8fff;}

/* ── 잠금화면 ── */
#lockScreen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0c2040 0%,#070e1c 100%);
  padding:32px 24px;z-index:100;overflow-y:auto;
}
#lockScreen.show{display:flex;}
.pin-dots{display:flex;gap:18px;margin-bottom:34px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #253a5c;transition:all .14s;}
.pin-dot.filled{background:#60a5fa;border-color:#60a5fa;box-shadow:0 0 10px rgba(96,165,250,.7);}
.pin-dot.err{background:#e03131;border-color:#e03131;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.keypad{display:grid;grid-template-columns:repeat(3,72px);gap:13px;margin-bottom:20px;}
.key{width:72px;height:72px;border-radius:50%;background:#0f1628;border:1px solid #1e2e48;color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;font-family:'DM Mono',monospace;}
.key:active{background:#162035;transform:scale(.91);}
.key.kdel{font-size:19px;color:#7090b8;}
.key.kbio{font-size:26px;}
.key.kempty{background:transparent;border:none;pointer-events:none;}
.lk-err{font-size:13px;color:#ff3333;min-height:18px;text-align:center;font-weight:600;}
.lk-hint{font-size:11px;color:#7090b8;text-align:center;padding:0 30px;line-height:1.7;margin-top:6px;}
.bio-reg-btn{margin-top:14px;padding:11px 22px;border-radius:10px;background:#0a1e38;border:1px solid #4a8fff;color:#4a8fff;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;}
.bio-status{font-size:11px;margin-top:8px;text-align:center;min-height:16px;font-family:'DM Mono',monospace;}
.bio-status.ok{color:#00ffcc;}.bio-status.err{color:#ff3333;}

/* PIN 설정 */
#pinSetup{position:fixed;inset:0;max-width:480px;margin:0 auto;z-index:101;background:#070e1c;display:none;flex-direction:column;align-items:center;justify-content:center;}
#pinSetup.show{display:flex;}

/* ── 홈 대시보드 ── */
#homeScreen{display:none;z-index:50;overflow-y:auto;background:#070e1c;}
#homeScreen.show{display:block;}

/* ── 앱 레이어 (iframe) ── */
#appLayer{display:none;z-index:60;}
#appLayer.show{display:block;}
#stockFrame,#fundFrame{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;background:#070e1c;
  display:none;
}
#stockFrame.show,#fundFrame.show{display:block;}

/* ── 로그인 상태 배지 (홈 우상단) ── */
#loginBadge{
  position:fixed;top:14px;right:14px;z-index:80;
  background:#0a1628;border:1px solid #1e2e48;
  border-radius:20px;padding:6px 12px;
  font-size:11px;color:#7090b8;
  font-family:'DM Mono',monospace;
  cursor:pointer;display:none;
}
#loginBadge.show{display:flex;align-items:center;gap:5px;}

/* ── 토스트 ── */
#syncToast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(20px);
  z-index:9000;background:#0f1628;
  border:1px solid #4a8fff;border-radius:12px;
  padding:12px 20px;font-size:13px;color:#f0f4f8;
  font-family:'Noto Sans KR',sans-serif;font-weight:600;
  white-space:nowrap;opacity:0;transition:all .28s;
  pointer-events:none;
}
#syncToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ════════════════════════════════════════
  ★ 새로 추가: Firebase 로그인 화면
  앱 최초 실행 or 로그아웃 후에만 표시됩니다
════════════════════════════════════════ -->
<div id="loginScreen">
  <!-- 로고 -->
  <div style="text-align:center;margin-bottom:36px;">
    <div style="font-size:52px;margin-bottom:12px;">🏦</div>
    <div style="font-size:10px;color:#4a8fff;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-family:'DM Mono',monospace;">MY ASSET MANAGER</div>

<script>
'use strict';

/* ════════════════════════════════
   ★ Firebase 설정
════════════════════════════════ */
const FB_CONFIG = {
  apiKey:            "AIzaSyD9A3cbUujY4agOwB0OL45ccsfRhBXETMw",
  authDomain:        "mymonth-6cd61.firebaseapp.com",
  projectId:         "mymonth-6cd61",
  storageBucket:     "mymonth-6cd61.firebasestorage.app",
  messagingSenderId: "1067760522796",
  appId:             "1:1067760522796:web:f97a12c210482e6e8de389"
};

let _fbAuth = null, _fbDb = null, _fbUser = null;
let _fbReady = false;

/* Firebase SDK 로드 및 초기화 */
async function initFirebase() {
  try {
    const [
      { initializeApp },
      { getAuth, onAuthStateChanged,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        signOut },
      { getFirestore, doc, setDoc, getDoc }
    ] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"),
      import("https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js")
    ]);

    const app = initializeApp(FB_CONFIG);
    _fbAuth = getAuth(app);
    _fbDb   = getFirestore(app);
    _fbReady = true;

    // 전역 함수 저장
    window._fb = {
      signInWithEmailAndPassword, createUserWithEmailAndPassword,
      signOut, doc, setDoc, getDoc
    };

    // ★ 로그인 상태 감지 — 앱 흐름의 핵심
    onAuthStateChanged(_fbAuth, async (user) => {
      _fbUser = user;
      if (user) {
        // ✅ 로그인됨
        updateSyncStatus(true, user.email);
        // 혹시 로그인 화면이 떠있으면 닫기
        hideLoginScreen();
        // 백그라운드에서 자동 백업 (3초 후)
        setTimeout(() => backupToCloud(), 3000);
      } else {
        // ❌ 로그아웃 상태
        updateSyncStatus(false, null);
      }
    });

    return true;
  } catch(e) {
    console.warn("[Firebase] 초기화 실패:", e);
    return false;
  }
}

/* ════════════════════════════════

/* ★ 로그인 실행 */
window.doLogin = async function() {
  const email = (document.getElementById('loginEmail').value || '').trim();
  const pw    = document.getElementById('loginPw').value || '';
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');

  if (!email) { errEl.textContent = '이메일을 입력해주세요'; return; }
  if (!pw)    { errEl.textContent = '비밀번호를 입력해주세요'; return; }

  btn.disabled = true;
  btn.textContent = '⏳ 로그인 중...';
  errEl.textContent = '';

  try {
    await window._fb.signInWithEmailAndPassword(_fbAuth, email, pw);
    // 성공 → onAuthStateChanged 가 자동으로 처리
    showSyncToast('✅ 로그인 완료!');
    hideLoginScreen();
    // PIN 화면으로 이동
    startApp();
  } catch(e) {
    const msg =
      e.code === 'auth/user-not-found'   ? '등록된 이메일이 없어요. 계정 만들기를 눌러주세요.' :
      e.code === 'auth/wrong-password'   ? '비밀번호가 틀렸어요.' :
      e.code === 'auth/invalid-email'    ? '이메일 형식이 올바르지 않아요.' :
      e.code === 'auth/invalid-credential' ? '이메일 또는 비밀번호가 틀렸어요.' :
      e.code === 'auth/too-many-requests'? '너무 많이 시도했어요. 잠시 후 다시 해주세요.' :
      '로그인 실패: ' + (e.message || e.code);
    errEl.textContent = msg;
    btn.disabled = false;
    btn.textContent = '🔑 로그인';
  }
};

/* ★ 회원가입 실행 */
window.doRegister = async function() {
  const email = (document.getElementById('loginEmail').value || '').trim();
  const pw    = document.getElementById('loginPw').value || '';
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('registerBtn');

  if (!email) { errEl.textContent = '이메일을 입력해주세요'; return; }
  if (!pw || pw.length < 6) { errEl.textContent = '비밀번호는 6자 이상이어야 해요'; return; }

  btn.disabled = true;
  btn.textContent = '⏳ 계정 만드는 중...';
  errEl.textContent = '';

  try {
    await window._fb.createUserWithEmailAndPassword(_fbAuth, email, pw);
    showSyncToast('🎉 계정 생성 완료! 데이터를 백업합니다...');
    hideLoginScreen();
    startApp();
    setTimeout(() => backupToCloud(), 2000);
  } catch(e) {
    const msg =
      e.code === 'auth/email-already-in-use' ? '이미 사용 중인 이메일이에요. 로그인을 눌러주세요.' :
      e.code === 'auth/weak-password'         ? '비밀번호가 너무 짧아요 (6자 이상).' :
      e.code === 'auth/invalid-email'         ? '이메일 형식이 올바르지 않아요.' :
      '계정 생성 실패: ' + (e.message || e.code);
    errEl.textContent = msg;
    btn.disabled = false;
    btn.textContent = '✉️ 처음이에요 — 계정 만들기';
  }
};

/* ★ 나중에 하기 (동기화 없이 사용) */
window.skipLogin = function() {
  localStorage.setItem('fb_login_skipped', '1');

  startApp();
};

/* ════════════════════════════════
   ★ 클라우드 백업 / 복원
════════════════════════════════ */
// 백업할 localStorage 키 목록
const BACKUP_KEYS = ['asset_pin', 'asset_bio_cred'];

async function backupToCloud() {
  if (!_fbUser || !_fbDb) return;
  try {
    const data = { updatedAt: new Date().toISOString() };
    BACKUP_KEYS.forEach(k => {
      const v = localStorage.getItem(k);
      if (v !== null) data[k] = v;
    });
    const { doc, setDoc } = window._fb;
    await setDoc(doc(_fbDb, 'users', _fbUser.uid, 'apps', 'index'), data, { merge: true });
    console.log('[Firebase] index 백업 완료');
  } catch(e) {
    console.warn('[Firebase] 백업 실패:', e);
  }
}

async function restoreFromCloud() {
  if (!_fbUser || !_fbDb) return false;
  try {
    const { doc, getDoc } = window._fb;
    const snap = await getDoc(doc(_fbDb, 'users', _fbUser.uid, 'apps', 'index'));
    if (!snap.exists()) return false;
    const data = snap.data();
    BACKUP_KEYS.forEach(k => { if (data[k]) localStorage.setItem(k, data[k]); });
    console.log('[Firebase] index 복원 완료');
    return true;
  } catch(e) {
    console.warn('[Firebase] 복원 실패:', e);
    return false;
  }
}

/* ════════════════════════════════
   PIN 잠금 시스템 (기존 그대로)
════════════════════════════════ */
const PIN_KEY = 'asset_pin';
const BIO_KEY = 'asset_bio_cred';
let pinBuf='', setupBuf='', setupFirst='', setupPhase=0;

const getPin = () => localStorage.getItem(PIN_KEY) || '';
const setPin = p => localStorage.setItem(PIN_KEY, p);
const hasBio = () => !!localStorage.getItem(BIO_KEY);
const bioOk  = () => !!window.PublicKeyCredential;
const RP_ID  = location.hostname || 'localhost';

function pk(k){ if(pinBuf.length>=4)return; pinBuf+=k; dots('d',pinBuf.length); if(pinBuf.length===4)setTimeout(checkPin,120); }
function pdel(){ pinBuf=pinBuf.slice(0,-1); dots('d',pinBuf.length); }
function checkPin(){
  if(pinBuf===getPin()){ setSt('',''); unlock(); }
  else{
    setSt('PIN이 틀렸습니다','err');
    for(let i=0;i<4;i++){const d=document.getElementById('d'+i);if(d)d.className='pin-dot err';}
    pinBuf=''; setTimeout(()=>{dots('d',0);setSt('','');},700);
  }
}

function sk(k){ if(setupBuf.length>=4)return; setupBuf+=k; dots('s',setupBuf.length); if(setupBuf.length===4)setTimeout(handleSetup,120); }
function sdel(){ setupBuf=setupBuf.slice(0,-1); dots('s',setupBuf.length); }
function handleSetup(){
  if(setupPhase===0){
    setupFirst=setupBuf; setupBuf=''; setupPhase=1; dots('s',0);
    document.getElementById('setupSub').textContent='PIN을 한 번 더 입력하세요';
  } else {
    if(setupBuf===setupFirst){
      setPin(setupBuf); setupBuf=''; setupFirst=''; setupPhase=0;
      document.getElementById('pinSetup').classList.remove('show');
      document.getElementById('lockScreen').classList.add('show');
      document.getElementById('bioRegBtn').style.display='flex';
      setSt('PIN 입력 후 지문을 등록할 수 있습니다','');
    } else {
      document.getElementById('setupErr').textContent='PIN이 일치하지 않습니다';
      setupBuf=''; setupFirst=''; setupPhase=0; dots('s',0);
      document.getElementById('setupSub').textContent='사용할 4자리 PIN을 입력하세요';
      setTimeout(()=>document.getElementById('setupErr').textContent='',2000);
    }
  }
}

function dots(p,n){ for(let i=0;i<4;i++){const d=document.getElementById(p+i);if(d)d.className='pin-dot'+(i<n?' filled':'');} }
function setSt(msg,type){
  const e=document.getElementById('lkErr'), h=document.getElementById('lkHint');
  if(msg&&type==='err'){ e.textContent=msg; h.textContent=''; }
  else{ e.textContent=''; h.textContent=msg; }
  const bs=document.getElementById('bioStatus'); if(bs)bs.textContent=''; bs&&(bs.className='bio-status');
}

/* 지문 인증 */
async function tryBio(){
  if(!bioOk()||!hasBio()){ setSt('지문 미등록. PIN을 입력해주세요','err'); setTimeout(()=>setSt('',''),2000); return; }
  const bs=document.getElementById('bioStatus'); bs.textContent='지문을 인식해주세요...'; bs.className='bio-status';
  try{
    const b=Uint8Array.from(atob(localStorage.getItem(BIO_KEY)),c=>c.charCodeAt(0));
    await navigator.credentials.get({publicKey:{rpId:RP_ID,challenge:crypto.getRandomValues(new Uint8Array(32)),timeout:60000,userVerification:'required',allowCredentials:[{id:b,type:'public-key'}]}});
    bs.textContent=''; unlock();
  } catch(e){ bs.textContent='인식 실패. PIN을 입력해주세요'; bs.className='bio-status err'; setTimeout(()=>{bs.textContent='';bs.className='bio-status';},2000); }
}
async function enrollBio(){
  if(!bioOk()){ document.getElementById('bioStatus').textContent='생체인식 미지원'; return; }
  const bs=document.getElementById('bioStatus'); bs.textContent='지문을 인식해주세요...';
  try{
    const c=await navigator.credentials.create({publicKey:{
      rp:{id:RP_ID,name:'내 자산관리'},
      user:{id:new TextEncoder().encode('asset-user'),name:'user',displayName:'사용자'},
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
      timeout:60000
    }});
    localStorage.setItem(BIO_KEY,btoa(String.fromCharCode(...new Uint8Array(c.rawId))));
    bs.textContent='✓ 지문 등록 완료!'; bs.className='bio-status ok';
    document.getElementById('bioRegBtn').style.display='none';
    setSt('🫆 버튼으로 지문 잠금해제','');
    // 지문 등록 후 클라우드 백업
    setTimeout(() => backupToCloud(), 500);
  } catch(e){ bs.textContent=e.name==='NotAllowedError'?'지문 취소됨':'등록 실패'; bs.className='bio-status err'; }
}

/* ════════════════════════════════

/* ════════════════════════════════
   postMessage 수신
════════════════════════════════ */
const won = n => '₩' + Math.round(Math.abs(n)).toLocaleString('ko-KR');
const pct  = n => (n>=0?'+':'-') + Math.abs(n).toFixed(2) + '%';
let _stockData = null, _fundData = null;

window.addEventListener('message', e => {
  const d = e.data;
  if(!d||!d.type) return;
  if(d.type === 'GO_HOME'){ showHome(); return; }

  if(d.type === 'STOCK_SUMMARY'){
    _stockData = d;
    document.getElementById('stockTotal').textContent = won(d.total);
    document.getElementById('stockAmtBadge').textContent = won(d.total);
    const col = d.pnl>=0 ? '#e03131' : '#1971c2';
    document.getElementById('stockPnl').innerHTML =
      `<span style="font-size:13px;font-weight:700;color:${col}">${d.pnl>=0?'+':''}${won(d.pnl)} (${pct(d.pct)})</span>`;
    if(d.accts) document.getElementById('stockAcctBadges').innerHTML =
      d.accts.slice(0,5).map(a=>`<span style="font-size:10px;background:${a.color}22;border:1px solid ${a.color}55;border-radius:8px;padding:2px 8px;color:${a.color};font-weight:700;">${a.short}</span>`).join('');
    updateTotal();
  }

  if(d.type === 'FUND_SUMMARY'){
    _fundData = d;
    document.getElementById('fundTotal').textContent = won(d.total);
    document.getElementById('fundAmtBadge').textContent = won(d.total);
    const col = d.pnl>=0 ? '#ff3333' : '#4488ff';
    if(d.pnl!==0) document.getElementById('fundPnl').innerHTML =
      `<span style="font-size:13px;font-weight:700;color:${col}">${d.pnl>=0?'+':''}${won(d.pnl)} (${pct(d.pct)})</span>`;
    document.getElementById('fundStatusTxt').textContent =
      `${d.fundCount}개 펀드 · Google Sheets 연동`;
    updateTotal();
  }
});

function updateTotal(){
  const s = _stockData?.total || 0;
  const f = _fundData?.total  || 0;
  const sp = _stockData?.pnl  || 0;
  const fp = _fundData?.pnl   || 0;
  const total = s + f;
  const totalPnl = sp + fp;
  if(!total) return;
  document.getElementById('totalAmt').textContent = won(total);
  const col = totalPnl>=0 ? '#00ffcc' : '#4488ff';
  const badge = document.getElementById('totalPnlBadge');
  badge.style.display='inline';
  badge.style.color=col;
  badge.textContent = `${totalPnl>=0?'+':''}${won(totalPnl)} 수익`;
}

/* ════════════════════════════════
   ★ 앱 시작 흐름
   Firebase 로그인 → PIN → 홈
════════════════════════════════ */
function startApp() {
  // PIN 설정 여부 확인
  if(!getPin()){
    document.getElementById('pinSetup').classList.add('show');
  } else {
    document.getElementById('lockScreen').classList.add('show');
    if(hasBio()){
      setSt('🫆 버튼으로 지문 잠금해제','');
      setTimeout(tryBio, 400);
    } else {
      document.getElementById('bioRegBtn').style.display='flex';
      setSt('PIN 입력 후 지문을 등록할 수 있습니다','');
    }
    if(!bioOk()){ document.getElementById('bioRegBtn').style.display='none'; }
    else{
      PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(ok=>{
        if(!ok) document.getElementById('bioRegBtn').style.display='none';
      }).catch(()=>{});
    }
  }
}

/* ════════════════════════════════
   ★ 초기화 — Firebase 먼저, 그 다음 앱
════════════════════════════════ */
(async function init(){
  // Firebase 초기화 시도
  const fbOk = await initFirebase();

  if (fbOk) {
    // Firebase OK → 로그인 상태 확인 (onAuthStateChanged 에서 자동 처리)
    // 약간 기다렸다가 (onAuthStateChanged 응답 대기) 로그인 여부 결정
    await new Promise(r => setTimeout(r, 800));

    if (!_fbUser) {
      // 로그인 안 된 상태
      const skipped = localStorage.getItem('fb_login_skipped');
      if (skipped) {
        // 이전에 "나중에 하기" 선택 → 바로 PIN 화면
        startApp();
      } else {
        // 로그인 화면 표시
        showLoginScreen();
      }
    } else {
      // 이미 로그인됨 → 바로 PIN 화면
      startApp();
    }
  } else {
    // Firebase 실패 (오프라인 등) → 그냥 PIN 화면
    startApp();
  }
})();
</script>
