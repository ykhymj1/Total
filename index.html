<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#070e1c"/>
<title>내 자산관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#070e1c;font-family:'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;}
button{touch-action:manipulation;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
input{-webkit-appearance:none;appearance:none;font-size:16px!important;font-family:'Noto Sans KR',sans-serif;}
input:focus{outline:none;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}

/* ── 화면 레이어 ── */
#lockScreen,#homeScreen,#appLayer{position:fixed;inset:0;max-width:480px;margin:0 auto;}

/* ── 잠금화면 ── */
#lockScreen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0c2040 0%,#070e1c 100%);
  padding:32px 24px;z-index:100;overflow-y:auto;
}
.pin-dots{display:flex;gap:18px;margin-bottom:34px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #253a5c;transition:all .14s;}
.pin-dot.filled{background:#60a5fa;border-color:#60a5fa;box-shadow:0 0 10px rgba(96,165,250,.7);}
.pin-dot.err{background:#e03131;border-color:#e03131;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.keypad{display:grid;grid-template-columns:repeat(3,72px);gap:13px;margin-bottom:20px;}
.key{width:72px;height:72px;border-radius:50%;background:#0f1628;border:1px solid #1e2e48;color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;font-family:'DM Mono',monospace;}
.key:active{background:#162035;transform:scale(.91);}
.key.kdel{font-size:19px;color:#7090b8;}
.key.kbio{font-size:26px;}
.key.kempty{background:transparent;border:none;pointer-events:none;}
.lk-err{font-size:13px;color:#ff3333;min-height:18px;text-align:center;font-weight:600;}
.lk-hint{font-size:11px;color:#7090b8;text-align:center;padding:0 30px;line-height:1.7;margin-top:6px;}
.bio-reg-btn{margin-top:14px;padding:11px 22px;border-radius:10px;background:#0a1e38;border:1px solid #4a8fff;color:#4a8fff;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;}
.bio-status{font-size:11px;margin-top:8px;text-align:center;min-height:16px;font-family:'DM Mono',monospace;}
.bio-status.ok{color:#00ffcc;}.bio-status.err{color:#ff3333;}

/* PIN 설정 */
#pinSetup{position:fixed;inset:0;max-width:480px;margin:0 auto;z-index:101;background:#070e1c;display:none;flex-direction:column;align-items:center;justify-content:center;}
#pinSetup.show{display:flex;}

/* ── 홈 대시보드 ── */
#homeScreen{display:none;z-index:50;overflow-y:auto;background:#070e1c;}
#homeScreen.show{display:block;}

/* ── 앱 레이어 (iframe) ── */
#appLayer{display:none;z-index:60;}
#appLayer.show{display:block;}
#stockFrame,#fundFrame{
  position:absolute;inset:0;width:100%;height:100%;
  border:none;background:#070e1c;
  display:none;
}
#stockFrame.show,#fundFrame.show{display:block;}
</style>
</head>
<body>

<!-- ════════ PIN 설정 (최초 1회) ════════ -->
<div id="pinSetup">
  <div style="font-size:48px;margin-bottom:14px;">🔐</div>
  <div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;">PIN 설정</div>
  <div style="font-size:12px;color:#7090b8;margin-bottom:44px;font-family:'DM Mono',monospace;" id="setupSub">사용할 4자리 PIN을 입력하세요</div>
  <div class="pin-dots">
    <div class="pin-dot" id="s0"></div><div class="pin-dot" id="s1"></div>
    <div class="pin-dot" id="s2"></div><div class="pin-dot" id="s3"></div>
  </div>
  <div class="keypad">
    <div class="key" onclick="sk('1')">1</div><div class="key" onclick="sk('2')">2</div><div class="key" onclick="sk('3')">3</div>
    <div class="key" onclick="sk('4')">4</div><div class="key" onclick="sk('5')">5</div><div class="key" onclick="sk('6')">6</div>
    <div class="key" onclick="sk('7')">7</div><div class="key" onclick="sk('8')">8</div><div class="key" onclick="sk('9')">9</div>
    <div class="key kempty"></div>
    <div class="key" onclick="sk('0')">0</div>
    <div class="key kdel" onclick="sdel()">⌫</div>
  </div>
  <div class="lk-err" id="setupErr"></div>
</div>

<!-- ════════ 잠금화면 ════════ -->
<div id="lockScreen">
  <div style="text-align:center;margin-bottom:40px;">
    <div style="font-size:52px;margin-bottom:12px;">🏦</div>
    <div style="font-size:10px;color:#527a96;letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;">MY ASSET MANAGER</div>
    <div style="font-size:22px;font-weight:800;color:#f0f4f8;">내 자산관리</div>
    <div id="lkSub" style="font-size:12px;color:#7090b8;margin-bottom:0;margin-top:6px;font-family:'DM Mono',monospace;">PIN을 입력하세요</div>
  </div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="keypad">
    <div class="key" onclick="pk('1')">1</div><div class="key" onclick="pk('2')">2</div><div class="key" onclick="pk('3')">3</div>
    <div class="key" onclick="pk('4')">4</div><div class="key" onclick="pk('5')">5</div><div class="key" onclick="pk('6')">6</div>
    <div class="key" onclick="pk('7')">7</div><div class="key" onclick="pk('8')">8</div><div class="key" onclick="pk('9')">9</div>
    <div class="key kbio" onclick="tryBio()">🫆</div>
    <div class="key" onclick="pk('0')">0</div>
    <div class="key kdel" onclick="pdel()">⌫</div>
  </div>
  <div class="lk-err" id="lkErr"></div>
  <button class="bio-reg-btn" id="bioRegBtn" onclick="enrollBio()" style="display:none">🫆 지문 등록하기</button>
  <div class="bio-status" id="bioStatus"></div>
  <div class="lk-hint" id="lkHint"></div>
</div>

<!-- ════════ 홈 대시보드 ════════ -->
<div id="homeScreen">
  <!-- 헤더 -->
  <div style="padding:36px 20px 22px;background:linear-gradient(160deg,#0c1830 0%,#070e1c 100%);">
    <div style="font-size:10px;color:#4a8fff;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;font-family:'DM Mono',monospace;">MY ASSET MANAGER</div>
    <div style="font-size:26px;font-weight:800;color:#fff;margin-bottom:3px;">내 자산관리</div>
    <div style="font-size:12px;color:#7090b8;" id="homeDateTxt"></div>
  </div>

  <!-- 전체 합계 카드 -->
  <div style="margin:0 16px;background:linear-gradient(135deg,#0a1628,#0f1f3a);border:1px solid #1e2e48;border-radius:18px;padding:20px;position:relative;overflow:hidden;">
    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4a8fff,#00ffcc);"></div>
    <div style="font-size:10px;color:#7090b8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;">전체 자산 합계</div>
    <div style="font-size:30px;font-weight:800;color:#fff;font-family:'DM Mono',monospace;margin-bottom:8px;" id="totalAmt">-</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span id="totalPnlBadge" style="font-size:13px;font-weight:700;display:none;"></span>
    </div>
    <div style="display:flex;gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid #1e2e48;">
      <div>
        <div style="font-size:10px;color:#7090b8;margin-bottom:3px;">주식·ETF</div>
        <div style="font-size:13px;font-weight:700;color:#ddeeff;font-family:'DM Mono',monospace;" id="stockAmtBadge">-</div>
      </div>
      <div style="width:1px;background:#1e2e48;"></div>
      <div>
        <div style="font-size:10px;color:#7090b8;margin-bottom:3px;">펀드</div>
        <div style="font-size:13px;font-weight:700;color:#ddeeff;font-family:'DM Mono',monospace;" id="fundAmtBadge">-</div>
      </div>
    </div>
  </div>

  <!-- 앱 카드들 -->
  <div style="padding:14px 16px 0;display:flex;flex-direction:column;gap:12px;">

    <!-- 주식 카드 -->
    <div onclick="enterApp('stock')" style="background:linear-gradient(135deg,#0a1628,#0d1f38);border:1px solid #1e3250;border-radius:20px;padding:20px;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;active:opacity:.9;">
      <div style="position:absolute;top:0;left:0;bottom:0;width:4px;background:linear-gradient(180deg,#60a5fa,#3b82f6);border-radius:4px 0 0 4px;"></div>
      <div style="padding-left:8px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
          <div style="flex:1;">
            <div style="font-size:10px;color:#527a96;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">주식 · ETF 포트폴리오</div>
            <div style="font-size:22px;font-weight:800;color:#fff;" id="stockTotal">-</div>
            <div style="margin-top:5px;min-height:20px;" id="stockPnl"></div>
          </div>
          <div style="font-size:34px;opacity:.8;margin-left:12px;">📊</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:22px;" id="stockAcctBadges"></div>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;">
          <span style="font-size:12px;color:#60a5fa;font-weight:700;">포트폴리오 보기</span>
          <span style="font-size:16px;color:#60a5fa;">›</span>
        </div>
      </div>
    </div>

    <!-- 펀드 카드 -->
    <div onclick="enterApp('fund')" style="background:linear-gradient(135deg,#080f20,#0c1530);border:1px solid #1e2e48;border-radius:20px;padding:20px;cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;">
      <div style="position:absolute;top:0;left:0;bottom:0;width:4px;background:linear-gradient(180deg,#00ffcc,#4a8fff);border-radius:4px 0 0 4px;"></div>
      <div style="padding-left:8px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
          <div style="flex:1;">
            <div style="font-size:10px;color:#527a96;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">펀드 포트폴리오</div>
            <div style="font-size:22px;font-weight:800;color:#fff;" id="fundTotal">-</div>
            <div style="margin-top:5px;min-height:20px;" id="fundPnl"></div>
          </div>
          <div style="font-size:34px;opacity:.8;margin-left:12px;">📁</div>
        </div>
        <div style="font-size:11px;color:#4a8fff;font-family:'DM Mono',monospace;margin-bottom:12px;" id="fundStatusTxt">Google Sheets 연동</div>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;">
          <span style="font-size:12px;color:#4a8fff;font-weight:700;">펀드 보기</span>
          <span style="font-size:16px;color:#4a8fff;">›</span>
        </div>
      </div>
    </div>

  </div>

  <!-- 하단 잠금 버튼 -->
  <div style="padding:20px 16px;text-align:center;">
    <button onclick="lockApp()" style="background:none;border:1px solid #1e2e48;border-radius:12px;color:#4a5568;font-size:13px;padding:10px 28px;cursor:pointer;">🔒 잠금</button>
  </div>
</div>

<!-- ════════ 앱 iframe 레이어 ════════ -->
<div id="appLayer">
  <iframe id="stockFrame" src="stock.html" allow="camera; microphone" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  <iframe id="fundFrame"  src="fund.html"  allow="camera; microphone" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
'use strict';
/* ════════════════════════════════
   PIN 잠금 시스템
════════════════════════════════ */
const PIN_KEY = 'asset_pin';
const BIO_KEY = 'asset_bio_cred';
let pinBuf='', setupBuf='', setupFirst='', setupPhase=0;

const getPin = () => localStorage.getItem(PIN_KEY) || '';
const setPin = p => localStorage.setItem(PIN_KEY, p);
const hasBio = () => !!localStorage.getItem(BIO_KEY);
const bioOk  = () => !!window.PublicKeyCredential;
const RP_ID  = location.hostname || 'localhost';

/* PIN 입력 */
function pk(k){ if(pinBuf.length>=4)return; pinBuf+=k; dots('d',pinBuf.length); if(pinBuf.length===4)setTimeout(checkPin,120); }
function pdel(){ pinBuf=pinBuf.slice(0,-1); dots('d',pinBuf.length); }
function checkPin(){
  if(pinBuf===getPin()){ setSt('',''); unlock(); }
  else{
    setSt('PIN이 틀렸습니다','err');
    for(let i=0;i<4;i++){const d=document.getElementById('d'+i);if(d)d.className='pin-dot err';}
    pinBuf=''; setTimeout(()=>{dots('d',0);setSt('','');},700);
  }
}

/* PIN 설정 */
function sk(k){ if(setupBuf.length>=4)return; setupBuf+=k; dots('s',setupBuf.length); if(setupBuf.length===4)setTimeout(handleSetup,120); }
function sdel(){ setupBuf=setupBuf.slice(0,-1); dots('s',setupBuf.length); }
function handleSetup(){
  if(setupPhase===0){
    setupFirst=setupBuf; setupBuf=''; setupPhase=1; dots('s',0);
    document.getElementById('setupSub').textContent='PIN을 한 번 더 입력하세요';
  } else {
    if(setupBuf===setupFirst){
      setPin(setupBuf); setupBuf=''; setupFirst=''; setupPhase=0;
      document.getElementById('pinSetup').classList.remove('show');
      document.getElementById('lockScreen').style.display='flex';
      document.getElementById('bioRegBtn').style.display='flex';
      setSt('PIN 입력 후 지문을 등록할 수 있습니다','');
    } else {
      document.getElementById('setupErr').textContent='PIN이 일치하지 않습니다';
      setupBuf=''; setupFirst=''; setupPhase=0; dots('s',0);
      document.getElementById('setupSub').textContent='사용할 4자리 PIN을 입력하세요';
      setTimeout(()=>document.getElementById('setupErr').textContent='',2000);
    }
  }
}

function dots(p,n){ for(let i=0;i<4;i++){const d=document.getElementById(p+i);if(d)d.className='pin-dot'+(i<n?' filled':'');} }
function setSt(msg,type){
  const e=document.getElementById('lkErr'), h=document.getElementById('lkHint');
  if(msg&&type==='err'){ e.textContent=msg; h.textContent=''; }
  else{ e.textContent=''; h.textContent=msg; }
  const bs=document.getElementById('bioStatus'); if(bs)bs.textContent=''; bs&&(bs.className='bio-status');
}

/* 지문 인증 */
async function tryBio(){
  if(!bioOk()||!hasBio()){ setSt('지문 미등록. PIN을 입력해주세요','err'); setTimeout(()=>setSt('',''),2000); return; }
  const bs=document.getElementById('bioStatus'); bs.textContent='지문을 인식해주세요...'; bs.className='bio-status';
  try{
    const b=Uint8Array.from(atob(localStorage.getItem(BIO_KEY)),c=>c.charCodeAt(0));
    await navigator.credentials.get({publicKey:{rpId:RP_ID,challenge:crypto.getRandomValues(new Uint8Array(32)),timeout:60000,userVerification:'required',allowCredentials:[{id:b,type:'public-key'}]}});
    bs.textContent=''; unlock();
  } catch(e){ bs.textContent='인식 실패. PIN을 입력해주세요'; bs.className='bio-status err'; setTimeout(()=>{bs.textContent='';bs.className='bio-status';},2000); }
}
async function enrollBio(){
  if(!bioOk()){ document.getElementById('bioStatus').textContent='생체인식 미지원'; return; }
  const bs=document.getElementById('bioStatus'); bs.textContent='지문을 인식해주세요...';
  try{
    const c=await navigator.credentials.create({publicKey:{
      rp:{id:RP_ID,name:'내 자산관리'},
      user:{id:new TextEncoder().encode('asset-user'),name:'user',displayName:'사용자'},
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
      timeout:60000
    }});
    localStorage.setItem(BIO_KEY,btoa(String.fromCharCode(...new Uint8Array(c.rawId))));
    bs.textContent='✓ 지문 등록 완료!'; bs.className='bio-status ok';
    document.getElementById('bioRegBtn').style.display='none';
    setSt('🫆 버튼으로 지문 잠금해제','');
  } catch(e){ bs.textContent=e.name==='NotAllowedError'?'지문 취소됨':'등록 실패'; bs.className='bio-status err'; }
}

/* ════════════════════════════════
   앱 흐름 제어
════════════════════════════════ */
let _stockLoaded=false, _fundLoaded=false;

function unlock(){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('pinSetup').classList.remove('show');
  showHome();
}

function showHome(){
  document.getElementById('homeScreen').classList.add('show');
  document.getElementById('appLayer').classList.remove('show');
  document.getElementById('stockFrame').classList.remove('show');
  document.getElementById('fundFrame').classList.remove('show');
  // 날짜
  const now=new Date(), days=['일','월','화','수','목','금','토'];
  document.getElementById('homeDateTxt').textContent=
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
}

function enterApp(which){
  document.getElementById('homeScreen').classList.remove('show');
  document.getElementById('appLayer').classList.add('show');
  document.getElementById('stockFrame').classList.toggle('show', which==='stock');
  document.getElementById('fundFrame').classList.toggle('show', which==='fund');
}

function lockApp(){
  document.getElementById('homeScreen').classList.remove('show');
  document.getElementById('appLayer').classList.remove('show');
  document.getElementById('stockFrame').classList.remove('show');
  document.getElementById('fundFrame').classList.remove('show');
  document.getElementById('lockScreen').style.display='flex';
  pinBuf=''; dots('d',0); setSt('','');
  if(hasBio()) setTimeout(tryBio, 400);
}

/* ════════════════════════════════
   postMessage 수신 (자식 iframe → 부모)
════════════════════════════════ */
const won = n => '₩' + Math.round(Math.abs(n)).toLocaleString('ko-KR');
const pct  = n => (n>=0?'+':'-') + Math.abs(n).toFixed(2) + '%';

let _stockData = null, _fundData = null;

window.addEventListener('message', e => {
  const d = e.data;
  if(!d||!d.type) return;

  if(d.type === 'GO_HOME'){ showHome(); return; }

  if(d.type === 'STOCK_SUMMARY'){
    _stockData = d;
    document.getElementById('stockTotal').textContent = won(d.total);
    document.getElementById('stockAmtBadge').textContent = won(d.total);
    const col = d.pnl>=0 ? '#e03131' : '#1971c2';
    document.getElementById('stockPnl').innerHTML =
      `<span style="font-size:13px;font-weight:700;color:${col}">${d.pnl>=0?'+':''}${won(d.pnl)} (${pct(d.pct)})</span>`;
    if(d.accts) document.getElementById('stockAcctBadges').innerHTML =
      d.accts.slice(0,5).map(a=>`<span style="font-size:10px;background:${a.color}22;border:1px solid ${a.color}55;border-radius:8px;padding:2px 8px;color:${a.color};font-weight:700;">${a.short}</span>`).join('');
    updateTotal();
  }

  if(d.type === 'FUND_SUMMARY'){
    _fundData = d;
    document.getElementById('fundTotal').textContent = won(d.total);
    document.getElementById('fundAmtBadge').textContent = won(d.total);
    const col = d.pnl>=0 ? '#ff3333' : '#4488ff';
    if(d.pnl!==0) document.getElementById('fundPnl').innerHTML =
      `<span style="font-size:13px;font-weight:700;color:${col}">${d.pnl>=0?'+':''}${won(d.pnl)} (${pct(d.pct)})</span>`;
    document.getElementById('fundStatusTxt').textContent =
      `${d.fundCount}개 펀드 · Google Sheets 연동`;
    updateTotal();
  }
});

function updateTotal(){
  const s = _stockData?.total || 0;
  const f = _fundData?.total  || 0;
  const sp = _stockData?.pnl  || 0;
  const fp = _fundData?.pnl   || 0;
  const total = s + f;
  const totalPnl = sp + fp;
  if(!total) return;
  document.getElementById('totalAmt').textContent = won(total);
  const col = totalPnl>=0 ? '#00ffcc' : '#4488ff';
  const badge = document.getElementById('totalPnlBadge');
  badge.style.display='inline';
  badge.style.color=col;
  badge.textContent = `${totalPnl>=0?'+':''}${won(totalPnl)} 수익`;
}

/* ════════════════════════════════
   초기화
════════════════════════════════ */
(function init(){
  if(!getPin()){
    // PIN 미설정 → PIN 설정 화면
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('pinSetup').classList.add('show');
  } else if(hasBio()){
    setSt('🫆 버튼으로 지문 잠금해제','');
    setTimeout(tryBio, 400);
  } else {
    document.getElementById('bioRegBtn').style.display='flex';
    setSt('PIN 입력 후 지문을 등록할 수 있습니다','');
  }
  // 지문 지원 여부 확인
  if(!bioOk()){ document.getElementById('bioRegBtn').style.display='none'; }
  else{
    PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(ok=>{
      if(!ok) document.getElementById('bioRegBtn').style.display='none';
    }).catch(()=>{});
  }
})();
</script>
</body>
</html>
